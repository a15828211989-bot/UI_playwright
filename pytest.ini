[pytest]
# 测试文件位置
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 命令行选项
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --html=reports/pytest_report.html
    --self-contained-html
    --alluredir=reports/allure-results
    --clean-alluredir

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
log_file_level = INFO
log_file_format = %(asctime)s [%(levelname)s] %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
log_level = INFO

# 标记配置
markers =
    smoke: 冒烟测试
    regression: 回归测试
    ui: UI测试
    api: API测试
    slow: 慢速测试
    quick: 快速测试

# 测试配置
timeout = 300
timeout_method = thread
junit_suite_name = UI自动化测试
junit_logging = all